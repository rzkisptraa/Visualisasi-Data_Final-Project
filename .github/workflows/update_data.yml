name: Update Market Data Daily

on:
  schedule:
    # Runs at 10:00 UTC (17:00 WIB) every Monday to Friday.
    # The Indonesian Stock Exchange (IDX) closes at 16:00 WIB (09:00 UTC).
    # This gives it a 1-hour buffer to ensure Yahoo Finance has the closing data.
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch Data
        run: |
          python scripts/fetch_data.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.json data/meta.json
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated daily market data update" && git push)
